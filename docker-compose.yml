services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_healthy
    volumes:
      - .:/app
      - ./db.sqlite3:/app/db.sqlite3
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0

  worker:
    build: .
    command: celery -A config worker --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    healthcheck:
      test: [ "CMD", "bash", "-c", "celery -A config inspect ping -d celery@$$HOSTNAME | grep OK" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s